# 世界模型超参数
model:
  type: "mlp_gru"
  state_dim: 10
  action_dim: 4
  hidden_dim: 256
  num_layers: 2
  dropout: 0.1

training:
  learning_rate: 0.001
  batch_size: 64
  epochs: 100
  weight_decay: 0.0001
  lr_scheduler: "cosine"

data:
  train_ratio: 0.8
  val_ratio: 0.1
  test_ratio: 0.1
  normalize: true
