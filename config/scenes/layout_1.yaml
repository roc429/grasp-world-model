# 场景布局 1: 无障碍 — 物体在前方可直接抓取
layout_id: 1
description: "物体在前方，无障碍物，可直接抓取"
objects:
  target:
    position: [200, 0, 10]       # x, y, z (mm) — 物体在机械臂前方
    size: [20, 20, 20]           # 边长 20mm 立方体
    color: "red"
  obstacle:
    position: [250, 80, 10]      # 障碍物在旁边，不阻挡
    size: [15, 15, 15]
    color: "blue"
placement_zone:
  position: [250, -80, 10]       # 放置目标区
  radius: 30
